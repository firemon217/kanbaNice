user  nginx;
worker_processes  auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  upstream backend_upstream {
    server backend:8080;
  }

  # 1. Редирект HTTP -> HTTPS
  server {
    listen 80;
    server_name localhost; # Укажите ваш домен, если есть
    return 301 https://$host$request_uri;
  }

  # 2. Основной HTTPS сервер
  server {
    listen 443 ssl http2;
    server_name localhost; # Укажите ваш домен, если есть

    # Пути к сертификатам (относительно рабочей директории nginx или абсолютные)
    ssl_certificate     /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;

    # Настройки SSL (безопасные defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Frontend (static)
    root /usr/share/nginx/html;
    index index.html;

    # API proxy
    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header Connection "";
      proxy_set_header Authorization $http_authorization;
    }

    location /auth/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header Connection "";
    }

    location /uploads/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    location = /uploads { return 301 /uploads/; }
    location = /api { return 301 /api/; }
    location = /auth { return 301 /auth/; }

    # SPA routing
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}