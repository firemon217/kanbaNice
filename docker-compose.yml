services:
  postgres:
    image: postgres:16-alpine
    container_name: kanbaNice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kanbaNice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pilot7736
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kanbaNice"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: kanbaNice-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kanbaNice
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: pilot7736
      FILE_UPLOAD_DIR: uploads
      APP_FRONTEND_URL: https://localhost/
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend:/app
    working_dir: /app
    command: ["./mvnw", "spring-boot:run"]

  frontend:
    build:
      context: ./frontend
    container_name: kanbaNice-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: ["sh", "-c", "npm run build && tail -f /dev/null"]

  nginx:
    build:
      context: ./nginx
    container_name: kanbaNice-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro


volumes:
  postgres_data:
